<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippine Robotics - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav id="tabpage">
            <name>Philippine Robotics</name>
            <br>
            <byline>Your human help and aesthetics!</byline>

        <div class="menu">
            <ul class="nav-links">
                <li><a href="about.html">About us</a></li>
                <li><a href="contactus.html">Contact</a></li>
                <li><a href="services.html">Services</a></li>
            </ul>
        </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <img src="mainPage1.jpg" alt="Main Page 1" class="bg-image">
            <div class="text-overlay">
            <h1>Contact Us</h1>
            <p>Have questions or feedback? We'd love to hear from you!</p>
            <form action="#" method="post" src="script.js">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br>

                <label for="message">Message:</label>
                <textarea id="message" name="message" cols="50" rows="10"></textarea>
                <br>

                <label for="number">Phone Number:</label>
                <input type="tel" id="number" name="number" placeholder="Example: 09XXXXXXXXX" pattern="[0-9]{11}" required>
                <br>
                
                <button type="submit">Send Message</button>
                <button><a href="index.html">Back to Home</a></button> 
            </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
